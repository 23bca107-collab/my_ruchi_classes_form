<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Portal | Ruchi Classes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #2575fc;
            --secondary-color: #6a11cb;
            --success-color: #4CAF50;
            --success-dark: #2E8B57;
            --light-color: #ffffff;
            --dark-color: #333333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            --radius: 16px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            background: var(--light-color);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }
        
        /* Decorative elements */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
        }
        
        .logo-container {
            margin-bottom: 25px;
        }
        
        .logo {
            max-width: 120px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: var(--dark-color);
            margin-bottom: 10px;
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            background: var(--success-color);
            color: var(--light-color);
            font-weight: 600;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .btn:hover, .btn:active {
            background: var(--success-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn i {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .btn-login {
            background: var(--primary-color);
        }
        
        .btn-login:hover, .btn-login:active {
            background: #1c5dc1;
        }
        
        .btn-signup {
            background: var(--secondary-color);
        }
        
        .btn-signup:hover, .btn-signup:active {
            background: #5509a8;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        
        .divider span {
            padding: 0 15px;
            color: #777;
            font-size: 0.9rem;
        }
        
        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            background: #f8f9fa;
            color: var(--dark-color);
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        
        .home-btn:hover, .home-btn:active {
            background: #e9ecef;
            border-color: #dee2e6;
            transform: translateY(-1px);
        }
        
        .home-btn i {
            margin-right: 8px;
        }
        
        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .feature {
            text-align: center;
            padding: 0 10px;
        }
        
        .feature i {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .feature span {
            display: block;
            font-size: 0.85rem;
            color: #666;
        }
        
        /* ===== IMPROVED MOBILE VIEW SIZES ===== */
        
        /* Tablet (768px and below) */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                min-height: 100vh;
                display: flex;
                align-items: center;
                background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            }
            
            .container {
                padding: 25px 20px;
                border-radius: 12px;
                box-shadow: 0 8px 25px rgba(0,0,0,0.2);
                max-width: 100%;
                width: 100%;
                margin: 0 auto;
            }
            
            .logo-container {
                margin-bottom: 20px;
            }
            
            .logo {
                max-width: 100px;
                height: auto;
            }
            
            h1 {
                font-size: 1.4rem; /* Reduced from 1.5rem */
                margin-bottom: 8px;
                line-height: 1.3;
            }
            
            .subtitle {
                font-size: 0.9rem; /* Reduced from 0.95rem */
                margin-bottom: 20px;
                line-height: 1.4;
                padding: 0 10px;
            }
            
            .btn-container {
                gap: 12px;
                margin-bottom: 20px;
            }
            
            .btn {
                padding: 14px 16px; /* Reduced from 18px 20px */
                font-size: 1rem; /* Reduced from 1.1rem */
                min-height: 52px; /* Slightly reduced from 56px */
                border-radius: 8px;
            }
            
            .btn i {
                font-size: 1.1rem; /* Reduced from 1.3rem */
                margin-right: 8px;
            }
            
            .divider {
                margin: 15px 0;
            }
            
            .divider span {
                font-size: 0.85rem;
                padding: 0 12px;
            }
            
            .home-btn {
                padding: 12px 16px; /* Reduced from 14px 18px */
                min-height: 44px; /* Reduced from 48px */
                font-size: 0.95rem; /* Reduced from 1rem */
                margin-top: 10px;
            }
            
            .home-btn i {
                font-size: 1rem;
                margin-right: 6px;
            }
            
            .features {
                flex-direction: column;
                gap: 12px;
                margin-top: 20px;
                padding-top: 15px;
            }
            
            .feature {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 5px 0;
            }
            
            .feature i {
                font-size: 1.2rem; /* Reduced from 1.3rem */
                margin-bottom: 0;
            }
            
            .feature span {
                font-size: 0.85rem; /* Reduced from 0.9rem */
            }
            
            .footer-links {
                margin-top: 20px;
                padding-top: 15px;
            }
            
            .footer-links a {
                font-size: 0.85rem;
            }
        }
        
        /* Mobile Small (480px and below) */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            
            .container {
                padding: 20px 15px;
                border-radius: 10px;
            }
            
            .logo {
                max-width: 90px;
            }
            
            h1 {
                font-size: 1.2rem; /* Further reduced for small mobile */
                margin-bottom: 6px;
            }
            
            .subtitle {
                font-size: 0.85rem; /* Further reduced */
                margin-bottom: 18px;
                padding: 0 5px;
            }
            
            .btn {
                padding: 13px 15px;
                font-size: 0.95rem;
                min-height: 50px;
            }
            
            .btn i {
                font-size: 1rem;
                margin-right: 6px;
            }
            
            .home-btn {
                padding: 10px 14px;
                min-height: 42px;
                font-size: 0.9rem;
            }
            
            .features {
                gap: 10px;
                margin-top: 15px;
            }
            
            .feature i {
                font-size: 1.1rem;
            }
            
            .feature span {
                font-size: 0.8rem;
            }
        }
        
        /* Mobile Very Small (360px and below) */
        @media (max-width: 360px) {
            .container {
                padding: 18px 12px;
            }
            
            .logo {
                max-width: 80px;
            }
            
            h1 {
                font-size: 1.1rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
            
            .btn {
                padding: 12px 14px;
                font-size: 0.9rem;
                min-height: 48px;
            }
            
            .btn i {
                font-size: 0.95rem;
            }
            
            .home-btn {
                padding: 9px 12px;
                font-size: 0.85rem;
            }
        }
        
        /* Landscape mode optimization */
        @media (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 10px;
                align-items: flex-start;
                min-height: auto;
                height: auto;
            }
            
            .container {
                padding: 15px;
                margin: 10px auto;
                max-width: 400px;
            }
            
            .logo-container {
                margin-bottom: 15px;
            }
            
            .logo {
                max-width: 80px;
            }
            
            h1 {
                font-size: 1.2rem;
                margin-bottom: 5px;
            }
            
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 12px;
                line-height: 1.3;
            }
            
            .btn-container {
                margin-bottom: 12px;
                gap: 8px;
            }
            
            .btn {
                padding: 10px 12px;
                font-size: 0.9rem;
                min-height: 44px;
            }
            
            .features {
                display: none; /* Hide features in landscape to save space */
            }
            
            .footer-links {
                margin-top: 10px;
                padding-top: 10px;
            }
        }
        
        /* Tablet optimization (769px - 1024px) */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 500px;
                padding: 45px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .btn {
                padding: 18px 28px;
                font-size: 1.1rem;
            }
        }
        
        /* Accessibility improvements */
        .btn:focus, .home-btn:focus {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }
        
        /* Loading animation */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .btn:active {
            animation: pulse 0.2s ease;
        }
        
        /* Back to home link at the very bottom */
        .footer-links {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }
        
        .footer-links a {
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .footer-links a:hover {
            color: var(--primary-color);
        }
        
        /* Prevent horizontal scroll on mobile */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="../assets/Ruchi logo.jpg" alt="Ruchi Classes Logo" class="logo">
    </div>
    
    <h1>Student Portal</h1>
    <p class="subtitle">Access your learning materials, assignments, and progress reports</p>
    
    <div class="btn-container">
        <a href="login.html" class="btn btn-login">
            <i class="fas fa-sign-in-alt"></i>
            Login to Your Account
        </a>
        
        <a href="signup.html" class="btn btn-signup">
            <i class="fas fa-user-plus"></i>
            Create New Account
        </a>
    </div>
    
    <div class="divider">
        <span>OR</span>
    </div>
    
    <a href="../ruchihomepage.html" class="home-btn">
        <i class="fas fa-home"></i>
        Back to Homepage
    </a>
    
    <div class="features">
        <div class="feature">
            <i class="fas fa-book-open"></i>
            <span>Study Materials</span>
        </div>
        <div class="feature">
            <i class="fas fa-tasks"></i>
            <span>Assignments</span>
        </div>
        <div class="feature">
            <i class="fas fa-chart-line"></i>
            <span>Progress Reports</span>
        </div>
    </div>
    
    <div class="footer-links">
        <a href="forgot-password.html">Forgot Password?</a> 
    </div>
</div>

<script>
    // Prevent zoom on double-tap (iOS)
    document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
            event.preventDefault();
        }
    }, { passive: false });

    // Prevent form resubmission on refresh
    if (window.history.replaceState) {
        window.history.replaceState(null, null, window.location.href);
    }

    // Handle back button on mobile
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            window.location.reload();
        }
    });

    // Add loading state to buttons
    document.querySelectorAll('.btn').forEach(button => {
        button.addEventListener('click', function(e) {
            // Check if target is a link (not disabled)
            if (this.getAttribute('href') && !this.classList.contains('disabled')) {
                // Add loading animation
                const originalText = this.innerHTML;
                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
                this.classList.add('disabled');
                
                // Restore after 3 seconds if navigation doesn't happen
                setTimeout(() => {
                    this.innerHTML = originalText;
                    this.classList.remove('disabled');
                }, 3000);
            }
        });
    });

    // Add touch feedback for mobile
    document.querySelectorAll('.btn, .home-btn').forEach(button => {
        button.addEventListener('touchstart', function() {
            this.style.opacity = '0.8';
        });
        
        button.addEventListener('touchend', function() {
            this.style.opacity = '1';
        });
        
        button.addEventListener('touchcancel', function() {
            this.style.opacity = '1';
        });
    });

    // Detect mobile device
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    
    // Add mobile-specific optimizations
    if (isMobile) {
        // Add viewport meta tag dynamically if needed
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
            viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
        }
        
        // Prevent long press context menu on buttons
        document.querySelectorAll('.btn, .home-btn').forEach(button => {
            button.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
        });
    }

    // Handle orientation change
    window.addEventListener('orientationchange', function() {
        // Force a repaint to fix layout issues
        setTimeout(function() {
            window.scrollTo(0, 0);
        }, 100);
    });

    // Keyboard navigation support
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const focused = document.activeElement;
            if (focused.classList.contains('btn')) {
                focused.click();
            }
        }
    });
</script>

</body>
</html>
